<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SmartSched AI v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --surface: rgba(255, 255, 255, 0.04);
            --accent: #4f8ef7;
            --accent2: #a855f7;
            --text: #e2e8f0;
            --muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(79, 142, 247, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(168, 85, 247, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            from {
                opacity: 0.8;
            }

            to {
                opacity: 1.2;
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 12s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #4f8ef7;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #a855f7;
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            top: 50%;
            left: 60%;
            animation-delay: -8s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        /* Grid pattern */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Glowing border card */
        .login-card {
            background: rgba(22, 27, 39, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 44px 40px;
            box-shadow:
                0 0 0 1px rgba(79, 142, 247, 0.1),
                0 32px 64px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #4f8ef7, #a855f7);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(79, 142, 247, 0.3);
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #4f8ef7, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .brand p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 6px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 15px;
            pointer-events: none;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: var(--text);
            padding: 12px 14px 12px 40px;
            font-size: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input:focus {
            outline: none;
            border-color: rgba(79, 142, 247, 0.5);
            background: rgba(79, 142, 247, 0.04);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.12);
        }

        input::placeholder {
            color: #3a4a60;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #4f8ef7, #6d5cf7);
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', system-ui, sans-serif;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            box-shadow: 0 4px 16px rgba(79, 142, 247, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(79, 142, 247, 0.4);
        }

        .btn-login:hover::before {
            opacity: 1;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: #f87171;
            font-size: 12px;
            text-align: center;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            display: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 24px 0 18px;
            color: var(--muted);
            font-size: 11px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }

        .demo-creds {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .demo-cred-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .demo-cred-btn:hover {
            background: rgba(79, 142, 247, 0.08);
            border-color: rgba(79, 142, 247, 0.2);
        }

        .demo-cred-btn .role {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 2px;
        }

        .demo-cred-btn .cred {
            font-size: 11px;
            color: var(--muted);
            font-family: monospace;
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 11px;
            color: rgba(100, 116, 139, 0.6);
        }
    </style>
</head>

<body>
    <div class="bg-canvas"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <h1>SmartSched AI v2</h1>
                <p>Industrial Production Decision Governance</p>
            </div>

            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" placeholder="Enter your password"
                        autocomplete="current-password">
                </div>
            </div>

            <button class="btn-login" id="login-btn" onclick="handleLogin()">Sign In →</button>
            <div id="error-msg" class="error-msg">Invalid username or password. Please try again.</div>

            <div class="divider">DEMO ACCOUNTS</div>

            <div class="demo-creds">
                <button class="demo-cred-btn" onclick="fillCreds('admin','admin123')">
                    <span class="role">Admin</span>
                    <span class="cred">admin / admin123</span>
                </button>
                <button class="demo-cred-btn" onclick="fillCreds('supervisor','super123')">
                    <span class="role">Supervisor</span>
                    <span class="cred">supervisor / super123</span>
                </button>
            </div>
        </div>

        <div class="footer-note">SmartSched AI v2 · Production Governance System</div>
    </div>

    <script>
        function fillCreds(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('username').dispatchEvent(new Event('input'));
        }

        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const err = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            err.style.display = 'none';
            btn.textContent = 'Signing in…';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('smartsched_user', JSON.stringify(data));
                    btn.textContent = '✓ Redirecting…';
                    btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
                    setTimeout(() => window.location.href = '/', 400);
                } else {
                    err.style.display = 'block';
                    btn.textContent = 'Sign In →';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }
            } catch (e) {
                err.textContent = '⚠ Server error. Please try again.';
                err.style.display = 'block';
                btn.textContent = 'Sign In →';
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }

        document.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>

</html>
